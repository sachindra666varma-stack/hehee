<!DOCTYPE html>
<html>
<head>
<title>Prom with Me?</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
background:#ffe6f0;
overflow:hidden;
margin-top:120px;
}

h1{
font-size:40px;
}

h2{
font-weight:normal;
}

button{
font-size:22px;
padding:15px 30px;
margin:20px;
border:none;
border-radius:10px;
cursor:pointer;
}

#yesBtn{
background:#ff4da6;
color:white;
}

#noBtn{
background:#666;
color:white;
position:absolute;
}

.heart{
position:absolute;
font-size:24px;
animation:float 3s linear forwards;
}

@keyframes float{
0%{opacity:1; transform:translateY(0);}
100%{opacity:0; transform:translateY(-200px);}
}

</style>

</head>

<body>

<h1>Will you go to prom with me ,Gayatri? 💃</h1>

<button id="yesBtn">Yes 💖</button>
<button id="noBtn">No</button>

<script>

let noBtn = document.getElementById("noBtn")
let yesBtn = document.getElementById("yesBtn")

let size = 22

noBtn.addEventListener("mouseover", function(){

let x = Math.random()*window.innerWidth*0.8
let y = Math.random()*window.innerHeight*0.8

noBtn.style.left = x+"px"
noBtn.style.top = y+"px"

size += 6
yesBtn.style.fontSize = size+"px"

createHeart()

})

yesBtn.onclick=function(){
document.body.innerHTML =
"<h1>Thank you for saying yes 💖</h1>\
<h2>I'm extremely sorry for the last 10 days.</h2>\
<h2>I really didn’t want things to go that way.</h2>\
<h2>Please give me one more chance. 🙏</h2>"

confetti()
}

function createHeart(){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💖"

heart.style.left=Math.random()*window.innerWidth+"px"
heart.style.top=Math.random()*window.innerHeight+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),3000)

}

function confetti(){

for(let i=0;i<120;i++){

let conf=document.createElement("div")

conf.innerHTML="🎉"
conf.style.position="absolute"
conf.style.left=Math.random()*window.innerWidth+"px"
conf.style.top=Math.random()*window.innerHeight+"px"
conf.style.fontSize="30px"

document.body.appendChild(conf)

}

}

</script>

</body>
</html>
